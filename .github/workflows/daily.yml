name: Library Alert

on:
  schedule:
    # 9:29 AM Eastern (adjust for DST if needed)
    - cron: "29 13 * * *"

  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run script
        run: main.py